<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letras + Acordes</title>
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:8080/");
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="stage">
      <main class="composition">
        <section id="editorCard" class="editor-card" aria-label="Area de edicion">
          <header class="editor-actions" aria-label="Acciones principales">
            <label id="dropZone" class="flow-button" for="audioInput">
              <input id="audioInput" type="file" accept="audio/*,.mp3,.wav,.m4a,.flac,.ogg,.aac,.aiff,.aif,.mp4" hidden />
              <span id="audioName">Subir audio</span>
            </label>

            <button id="exportPdfButton" class="flow-button primary" type="button" disabled>
              Exportar PDF
            </button>

            <p id="statusText" class="status" aria-live="polite"></p>
          </header>

          <section class="editor-window">
            <iframe id="editorFrame" title="Editor" src="/editor.html"></iframe>
          </section>
        </section>
      </main>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
